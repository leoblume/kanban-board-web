<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Importar Aprovados — Modelo 3003-2</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 30px; background: #f0f2f5; color: #333; }
    .container { max-width: 600px; margin: auto; background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
    h1 { font-size: 20px; color: #6610f2; margin-top: 0; }
    .btn-voltar { display: inline-block; margin-bottom: 20px; text-decoration: none; color: #6610f2; font-weight: bold; }
    input[type="file"] { display: block; margin: 20px 0; width: 100%; }
    button { background: #6610f2; color: white; border: none; padding: 12px 20px; border-radius: 6px; cursor: pointer; width: 100%; font-size: 16px; font-weight: 600; }
    button:hover { background: #520dc2; }
    #resultArea { margin-top: 25px; padding: 15px; border-radius: 8px; font-size: 14px; line-height: 1.6; }
    .success-msg { color: #198754; background: #e8f5e9; padding: 10px; border-radius: 5px; }
    .error-msg { color: #dc3545; background: #f8d7da; padding: 10px; border-radius: 5px; }
  </style>
</head>
<body>

<div class="container">
  <a href="aprovados.html" class="btn-voltar">← Voltar ao Painel</a>
  <h1>Importar Aprovados (Modelo 3003-2)</h1>
  <p style="font-size: 13px; color: #666;">Selecione o arquivo PDF "OS Aprovação" para processar.</p>
  
  <input type="file" id="pdfFile" accept="application/pdf">
  <button onclick="extractData()">Processar e Salvar no Banco</button>
  
  <div id="resultArea"></div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-app.js";
  import { getFirestore, collection, addDoc, getDocs, query, where } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore.js";

  const firebaseConfig = { 
    apiKey: "AIzaSyALCIfOdzUrbzs8_ceXXYFwsCeT161OFPw",
    authDomain: "kanban-board-92ce7.firebaseapp.com",
    projectId: "kanban-board-92ce7",
    storageBucket: "kanban-board-92ce7.appspot.com",
    messagingSenderId: "494809291125",
    appId: "1:494809291125:web:17f9eefa4287d39174db3c"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const aprovadosCollection = collection(db, "tasks_aprovados");

  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  window.extractData = async function() {
    const fileInput = document.getElementById('pdfFile');
    const file = fileInput.files[0];
    const resultArea = document.getElementById('resultArea');

    if (!file) {
      alert("Selecione um arquivo PDF.");
      return;
    }

    resultArea.innerHTML = "⏳ Lendo arquivo e extraindo textos...";

    const reader = new FileReader();
    reader.onload = async function() {
      try {
        const typedarray = new Uint8Array(reader.result);
        const pdf = await pdfjsLib.getDocument({ data: typedarray }).promise;
        let fullText = '';

        // Extração de texto página por página
        for (let i = 1; i <= pdf.numPages; i++) {
          const page = await pdf.getPage(i);
          const content = await page.getTextContent();
          
          // Ordenação por coordenadas (Y e X) para garantir leitura correta
          const items = content.items.sort((a, b) => {
            const yA = a.transform[5], yB = b.transform[5];
            const xA = a.transform[4], xB = b.transform[4];
            if (Math.abs(yA - yB) > 5) return yB - yA;
            return xA - xB;
          });

          fullText += items.map(item => item.str).join(' ') + ' ';
        }

        // Limpeza básica de espaços duplos
        fullText = fullText.replace(/\s{2,}/g, ' ');

        /* 
           NOVA REGEX PARA O MODELO 3003-2:
           1. (\d{5}) -> Captura a OS (5 dígitos)
           2. (.*?) -> Captura tudo até encontrar o status
           3. APR -> Palavra chave do Status
           4. \d{2}\/\d{2}\/\d{4}\s\d{2}:\d{2} -> Pula a data de aprovação
           5. (?:\d{2}\/\d{2}\/\d{4}\s\d{2}:\d{2})? -> Opcional (Data Ent. Prod)
           6. (\d{2}\/\d{2}\/\d{4}) -> Captura a Data de Previsão de Entrega
        */
        const regex = /(\d{5})\s+(.*?)\s+APR\s+\d{2}\/\d{2}\/\d{4}\s+\d{2}:\d{2}\s+(?:\d{2}\/\d{2}\/\d{4}\s+\d{2}:\d{2}\s+)?(\d{2}\/\d{2}\/\d{4})/g;
        
        let match;
        let count = 0;
        let duplicates = 0;

        resultArea.innerHTML = "💾 Salvando no banco de dados...";

        while ((match = regex.exec(fullText)) !== null) {
          const os = match[1];
          const clientAndDesc = match[2].trim();
          const delivery = match[3];

          // Verifica se a OS já existe para não duplicar
          const q = query(aprovadosCollection, where("osNumber", "==", os));
          const querySnapshot = await getDocs(q);

          if (querySnapshot.empty) {
            await addDoc(aprovadosCollection, {
              osNumber: os,
              clientName: clientAndDesc, // Salva o conjunto Cliente + Descrição conforme solicitado
              deliveryDisplay: delivery,
              deliveryDate: delivery.split('/').reverse().join('-'), // YYYY-MM-DD para ordenação
              createdAt: Date.now()
            });
            count++;
          } else {
            duplicates++;
          }
        }

        resultArea.innerHTML = `
          <div class="success-msg">
            <b>Concluído!</b><br>
            ✅ ${count} novas tarefas importadas.<br>
            ${duplicates > 0 ? `ℹ️ ${duplicates} tarefas já existiam e foram puladas.` : ''}
          </div>
        `;
        fileInput.value = '';

      } catch (error) {
        console.error(error);
        resultArea.innerHTML = `<div class="error-msg">Erro ao processar PDF: ${error.message}</div>`;
      }
    };
    reader.readAsArrayBuffer(file);
  };
</script>

</body>
</html>
